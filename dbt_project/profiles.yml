flowsync:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'flowsync_bi') }}"
      user: "{{ env_var('POSTGRES_USER', 'flowsync') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'flowsync_secret_change_me') }}"
      schema: public
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
    prod:
      type: postgres
      host: "{{ env_var('PROD_POSTGRES_HOST') }}"
      port: "{{ env_var('PROD_POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('PROD_POSTGRES_DB') }}"
      user: "{{ env_var('PROD_POSTGRES_USER') }}"
      password: "{{ env_var('PROD_POSTGRES_PASSWORD') }}"
      schema: public
      threads: 8
      keepalives_idle: 0
