version: 2

models:
  # ============================================================================
  # fct_mrr_movements
  # ============================================================================
  - name: fct_mrr_movements
    description: >
      MRR movements per account per month with full waterfall breakdown.
      Grain: account × month. Powers Revenue Movements dashboard.
    columns:
      - name: account_month_key
        description: Surrogate key (account_id + month_key)
        tests:
          - unique
          - not_null

      - name: account_id
        description: FK to stg_accounts
        tests:
          - not_null

      - name: month_start_date
        description: First day of the calendar month
        tests:
          - not_null

      - name: mrr
        description: Total MRR for this account this month (0 if churned)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500000

      - name: mrr_movement_type
        description: MRR movement classification
        tests:
          - not_null
          - accepted_values:
              values: ['new', 'expansion', 'contraction', 'retained', 'reactivation', 'churned']

      - name: new_mrr
        description: MRR from new accounts (0 if not new)
        tests:
          - not_null

      - name: expansion_mrr
        description: MRR gained from expansion (0 if no expansion)
        tests:
          - not_null

      - name: contraction_mrr
        description: MRR lost from contraction (positive value, 0 if no contraction)
        tests:
          - not_null

      - name: churned_mrr
        description: MRR lost from churn (positive value, 0 if not churned)
        tests:
          - not_null

      - name: reactivation_mrr
        description: MRR from reactivated accounts (0 if not reactivated)
        tests:
          - not_null

      - name: net_mrr_contribution
        description: Net MRR impact = new + expansion + reactivation - contraction - churn

      - name: arr
        description: ARR equivalent (mrr * 12)

  # ============================================================================
  # fct_account_monthly_health
  # ============================================================================
  - name: fct_account_monthly_health
    description: >
      Account health score and churn risk per month. Composite score from
      usage, seat utilization, feature adoption, support, CSAT, payment, tenure.
      Grain: account × month (active accounts only).
    columns:
      - name: account_month_key
        description: Surrogate key (account_id + month_key)
        tests:
          - unique
          - not_null

      - name: account_id
        description: FK to stg_accounts
        tests:
          - not_null

      - name: health_score
        description: Composite health score (0-100, higher = healthier)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: health_tier
        description: Health tier classification
        tests:
          - not_null
          - accepted_values:
              values: ['healthy', 'at_risk', 'high_risk', 'critical']

      - name: churn_risk_level
        description: Churn risk level
        tests:
          - not_null
          - accepted_values:
              values: ['minimal', 'low', 'medium', 'high', 'critical']

      - name: churn_risk_score
        description: Churn risk score (0-100, higher = more risk)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: risk_flag_count
        description: Number of active risk flags (0-6)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 6

  # ============================================================================
  # fct_customer_cohorts
  # ============================================================================
  - name: fct_customer_cohorts
    description: >
      Cohort retention analysis. Grain: cohort_month × months_since_created.
      Powers cohort heatmap, NRR by cohort, logo churn trend.
    columns:
      - name: cohort_period_key
        description: Surrogate key (cohort_month + months_since_created)
        tests:
          - unique
          - not_null

      - name: cohort_month
        description: YYYY-MM of the acquisition cohort
        tests:
          - not_null

      - name: months_since_created
        description: Months elapsed since cohort start
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 120

      - name: cohort_size
        description: Number of accounts in this cohort
        tests:
          - not_null
          - positive_values

      - name: logo_retention_rate
        description: Fraction of cohort accounts still active (0.0 to 1.0)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

      - name: revenue_retention_rate
        description: Cohort MRR as fraction of starting MRR (can exceed 1.0)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 5

      - name: nrr
        description: Net Revenue Retention (same as revenue_retention_rate)
        tests:
          - not_null

      - name: grr
        description: Gross Revenue Retention (capped at 1.0)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

      - name: cohort_health
        description: Cohort health classification
        tests:
          - not_null
          - accepted_values:
              values: ['excellent', 'good', 'fair', 'poor']

  # ============================================================================
  # fct_sales_conversion
  # ============================================================================
  - name: fct_sales_conversion
    description: >
      Sales funnel conversion per lead. Grain: one row per lead.
      Powers Funnel & Growth dashboard.
    columns:
      - name: conversion_key
        description: Surrogate key (lead_id)
        tests:
          - unique
          - not_null

      - name: lead_id
        description: PK from stg_leads
        tests:
          - unique
          - not_null

      - name: funnel_stage
        description: Current funnel stage
        tests:
          - not_null
          - accepted_values:
              values: ['lead', 'qualified', 'demo_requested', 'demo_completed',
                       'trial', 'paid', 'lost']

      - name: is_paid_conversion
        description: True if lead converted to paid
        tests:
          - not_null

      - name: trial_to_paid_rate
        description: Channel-month trial-to-paid conversion rate
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
              mostly: 0.99

  # ============================================================================
  # mart_exec_revenue_summary
  # ============================================================================
  - name: mart_exec_revenue_summary
    description: >
      Executive monthly revenue summary. Grain: one row per month.
      Powers Executive Overview dashboard — KPI cards, MRR trend, waterfall.
    columns:
      - name: exec_summary_key
        description: Surrogate key (month_key)
        tests:
          - unique
          - not_null

      - name: month_key
        description: YYYY-MM string
        tests:
          - unique
          - not_null

      - name: total_mrr
        description: Total MRR across all active accounts
        tests:
          - not_null
          - positive_values

      - name: total_arr
        description: ARR = total_mrr * 12
        tests:
          - not_null
          - positive_values

      - name: active_accounts
        description: Count of accounts with MRR > 0
        tests:
          - not_null
          - positive_values

      - name: nrr
        description: Net Revenue Retention rate (decimal, e.g. 1.12 = 112%)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 3

      - name: grr
        description: Gross Revenue Retention rate (decimal, capped at 1.0)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

      - name: logo_churn_rate
        description: Logo churn rate (decimal, e.g. 0.02 = 2%)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

  # ============================================================================
  # mart_customer_success_summary
  # ============================================================================
  - name: mart_customer_success_summary
    description: >
      Latest health snapshot per account. Grain: one row per account.
      Powers Customer Health & Churn Risk dashboard — risk table, quadrant.
    columns:
      - name: customer_success_key
        description: Surrogate key (account_id)
        tests:
          - unique
          - not_null

      - name: account_id
        description: FK to stg_accounts
        tests:
          - unique
          - not_null

      - name: health_score
        description: Latest composite health score (0-100)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: health_tier
        description: Health tier classification
        tests:
          - not_null
          - accepted_values:
              values: ['healthy', 'at_risk', 'high_risk', 'critical']

      - name: churn_risk_level
        description: Churn risk level
        tests:
          - not_null
          - accepted_values:
              values: ['minimal', 'low', 'medium', 'high', 'critical']

      - name: mrr
        description: Latest MRR for this account
        tests:
          - not_null

      - name: risk_priority_score
        description: Composite risk priority for sorting (higher = more urgent)
        tests:
          - not_null

      - name: health_trend
        description: Health trend direction vs prior month
        tests:
          - not_null
          - accepted_values:
              values: ['improving', 'stable', 'declining']
